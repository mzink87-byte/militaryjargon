name: Build term pages

on:
  push:
    branches: [ main ]
    paths:
      - 'acronyms.json'
      - 'generate-pages.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build all term pages + sitemap
        run: node generate-pages.js
      - name: Publish the generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terms sitemap.xml
          git commit -m "Auto-build term pages" || echo "Nothing changed"
          git push
